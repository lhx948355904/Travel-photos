version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: photomap-db
    environment:
      POSTGRES_DB: photomap
      POSTGRES_USER: ${DB_USER:-photomap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-photomap123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-photomap} -d photomap"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: photomap-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: photomap
      DB_USER: ${DB_USER:-photomap}
      DB_PASSWORD: ${DB_PASSWORD:-photomap123}
      JWT_SECRET: ${JWT_SECRET:-travel-photo-map-jwt-secret-key-2026}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: photomap-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
