server:
  port: 8080

spring:
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: travel-photo-map
  datasource:
    url: "${DB_URL:jdbc:h2:file:./data/photomap;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'}"
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  bucket: ${COS_BUCKET:}
  region: ${COS_REGION:}
  cdn-domain: ${COS_CDN_DOMAIN:}

jwt:
  secret: ${JWT_SECRET:travel-photo-map-jwt-secret-key-2026-change-me-in-production}
  expire-seconds: ${JWT_EXPIRE_SECONDS:86400}

admin:
  username: ${ADMIN_USERNAME:admin}
  password-hash: ${ADMIN_PASSWORD_HASH:$2a$10$wVBjIgQ0CkGN56lVfgaccew7F7/slrqq1mRVszfuIzL3HIZA1JV96}
