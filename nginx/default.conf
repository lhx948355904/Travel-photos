server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Same-origin media bridge for Three.js/CSS3D photo rendering.
    # The upstream host is fixed deliberately; this is not an open proxy.
    location ^~ /cos-media/ {
        proxy_pass https://travel-1255378306.cos.ap-guangzhou.myqcloud.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host travel-1255378306.cos.ap-guangzhou.myqcloud.com;
        proxy_set_header Referer "";
        proxy_set_header Origin "";
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* ^/(api/)?(\.env|\.git|vendor|phpunit|wp-|wordpress|phpmyadmin|pma|adminer|cgi-bin) {
        return 404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
